<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Notification</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: no-drag;
    }

    .notification-container {
      width: 350px;
      height: 120px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      padding: 16px;
      position: relative;
      cursor: pointer;
      animation: slideIn 0.3s ease-out;
      display: flex;
      flex-direction: column;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .close-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 10;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .content {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .icon {
      font-size: 32px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
    }

    .message {
      flex: 1;
      color: white;
      font-size: 14px;
      line-height: 1.4;
    }

    .message .highlight {
      font-weight: bold;
      text-decoration: underline;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: white;
      width: 100%;
      animation: progress 10s linear;
    }

    @keyframes progress {
      from {
        width: 100%;
      }
      to {
        width: 0%;
      }
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      animation: sparkle 1.5s infinite;
    }

    @keyframes sparkle {
      0%, 100% {
        opacity: 0;
        transform: scale(0);
      }
      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .sparkle:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 60%; left: 80%; animation-delay: 0.5s; }
    .sparkle:nth-child(3) { top: 40%; left: 90%; animation-delay: 1s; }
  </style>
</head>
<body>
  <div class="notification-container" id="notification">
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    
    <button class="close-btn" id="closeBtn">✕</button>
    
    <div class="content">
      <div class="icon">🎬</div>
      <div class="message">
        YouTube video is selected. <span class="highlight">Click here</span> to watch enhanced on <span class="highlight">Tutorial Clarity</span>
      </div>
    </div>
    
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <script>
    let youtubeUrl = '';
    let autoCloseTimer = null;

    // Receive YouTube URL from main process
    window.electronAPI.onYoutubeUrl((url) => {
      youtubeUrl = url;
      startAutoCloseTimer();
    });

    function startAutoCloseTimer() {
      autoCloseTimer = setTimeout(() => {
        window.electronAPI.closeNotification();
      }, 10000);
    }

    // Handle notification click
    document.getElementById('notification').addEventListener('click', (e) => {
      if (!e.target.closest('#closeBtn')) {
        window.electronAPI.notificationClicked(youtubeUrl);
      }
    });

    // Handle close button click
    document.getElementById('closeBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      clearTimeout(autoCloseTimer);
      window.electronAPI.closeNotification();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        clearTimeout(autoCloseTimer);
        window.electronAPI.closeNotification();
      } else if (e.key === 'Enter') {
        window.electronAPI.notificationClicked(youtubeUrl);
      }
    });
  </script>
</body>
</html>
